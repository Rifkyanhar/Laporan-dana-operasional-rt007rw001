<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel Bendahara - RT 07 / RW 01</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:wght@400;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F7F5EF; --surface:#FFFFFF; --border:#E4DDC9; --text:#2B3A2F;
    --muted:#7A7362; --accent:#3F6D50; --accent-light:#EAF2EC;
    --income:#2F8F5B; --expense:#C1553A; --gold:#C9A227; --danger:#C1553A;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--text);font-family:'Source Serif 4',Georgia,serif;font-size:17px;line-height:1.6;}
  .mono{font-family:'IBM Plex Mono',monospace;}
  .wrap{max-width:560px;margin:0 auto;padding:36px 20px 64px;}
  h1{font-size:28px;margin:0 0 4px;}
  .eyebrow{font-family:'IBM Plex Mono',monospace;color:var(--accent);font-size:14px;text-transform:uppercase;letter-spacing:.1em;margin:0 0 8px;}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:24px;margin-bottom:18px;}
  .card h2{font-size:18px;margin:0 0 14px;color:var(--accent);}
  label{display:block;font-family:'IBM Plex Mono',monospace;font-size:13px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:6px;}
  input,select{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:6px;font-size:17px;font-family:'Source Serif 4',serif;margin-bottom:16px;background:#FCFBF7;color:var(--text);}
  input:focus,select:focus{outline:2px solid var(--accent);outline-offset:1px;border-color:var(--accent);}
  .row{display:flex;gap:10px;}
  .row > div{flex:1;}
  .toggle{display:flex;gap:8px;margin-bottom:16px;}
  .toggle button{flex:1;padding:12px;border-radius:6px;border:1.5px solid var(--border);background:#fff;font-family:'IBM Plex Mono',monospace;font-size:15px;cursor:pointer;color:var(--muted);}
  .toggle button.active.masuk{background:var(--income);border-color:var(--income);color:#fff;}
  .toggle button.active.keluar{background:var(--expense);border-color:var(--expense);color:#fff;}
  button.primary{width:100%;background:var(--accent);color:#fff;border:none;border-radius:6px;padding:15px;font-size:16px;font-family:'IBM Plex Mono',monospace;cursor:pointer;}
  button.primary:disabled{opacity:.6;cursor:default;}
  button.secondary{width:100%;background:transparent;color:var(--accent);border:1.5px solid var(--accent);border-radius:6px;padding:13px;font-size:15px;font-family:'IBM Plex Mono',monospace;cursor:pointer;margin-top:8px;}
  .msg{font-size:15px;padding:12px 14px;border-radius:6px;margin-bottom:16px;font-family:'IBM Plex Mono',monospace;}
  .msg.error{background:#FBEAE5;color:var(--danger);border:1px solid var(--danger);}
  .msg.success{background:var(--accent-light);color:var(--accent);border:1px solid var(--accent);}
  .hint{font-size:14px;color:var(--muted);line-height:1.7;margin:0 0 14px;}
  .checkbox-row{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
  .checkbox-row input{width:auto;margin:0;}
  .checkbox-row label{margin:0;text-transform:none;letter-spacing:0;font-size:14px;}
  a{color:var(--accent);}
  #app{display:none;}
  .rincian-row{display:flex;gap:6px;margin-bottom:8px;align-items:flex-start;flex-wrap:wrap;}
  .rincian-row input{margin-bottom:0;}
  .rincian-row .r-nama{flex:2;min-width:110px;}
  .rincian-row .r-qty{flex:0.6;min-width:55px;}
  .rincian-row .r-satuan{flex:0.8;min-width:65px;}
  .rincian-row .r-harga{flex:1;min-width:90px;}
  .rincian-row .r-remove{flex:0 0 auto;background:transparent;border:1.5px solid var(--danger);color:var(--danger);border-radius:6px;padding:0 12px;cursor:pointer;font-size:16px;}
  .rincian-total{font-family:'IBM Plex Mono',monospace;font-size:14px;color:var(--accent);margin:6px 0 12px;text-align:right;}
  .add-item-btn{background:transparent;border:1.5px dashed var(--accent);color:var(--accent);border-radius:6px;padding:9px;width:100%;font-size:13px;font-family:'IBM Plex Mono',monospace;cursor:pointer;margin-bottom:6px;}
</style>
</head>
<body>
<div class="wrap">
  <p class="eyebrow">Panel Internal</p>
  <h1>Bendahara RT 07 / RW 01</h1>

  <div class="card" id="loginCard">
    <h2>Masuk</h2>
    <label for="pin">PIN Bendahara</label>
    <input type="password" id="pin" inputmode="numeric" placeholder="PIN">
    <div id="loginMsg"></div>
    <button class="primary" onclick="checkPin()">Masuk</button>
    <p class="hint">PIN default: <strong>0701</strong>. Ganti nilai <code>DEFAULT_PIN</code> di dalam kode file ini agar lebih aman.</p>
  </div>

  <div id="app">
    <div class="card">
      <h2>Pengaturan Penyimpanan Data</h2>
      <p class="hint">Isi sekali saja. Data ini tersimpan hanya di perangkat ini.</p>
      <div class="row">
        <div>
          <label>Kode Akun</label>
          <input id="ghOwner" placeholder="mis: rt07rw01semarang">
        </div>
        <div>
          <label>Nama Folder Data</label>
          <input id="ghRepo" placeholder="mis: laporan-kas-rt07">
        </div>
      </div>
      <label>Kunci Akses</label>
      <input id="ghToken" type="password" placeholder="Masukkan kunci akses">
      <div class="checkbox-row">
        <input type="checkbox" id="rememberToken">
        <label for="rememberToken">Ingat pengaturan ini di perangkat ini (tidak disarankan di HP bersama)</label>
      </div>
      <button class="secondary" onclick="saveSettings()">Simpan Pengaturan</button>
    </div>

    <div class="card">
      <h2>Saldo Awal</h2>
      <label>Saldo Awal (Rp)</label>
      <input id="saldoAwalInput" type="number" min="0">
      <button class="secondary" onclick="updateSaldoAwal()">Update Saldo Awal</button>
    </div>

    <div class="card">
      <h2>Catat Transaksi Baru</h2>
      <div id="formMsg"></div>
      <div class="toggle">
        <button type="button" id="btnMasuk" class="active masuk" onclick="setJenis('masuk')">Pemasukan</button>
        <button type="button" id="btnKeluar" class="keluar" onclick="setJenis('keluar')">Pengeluaran</button>
      </div>
      <label>Tanggal</label>
      <input id="tanggal" type="date">
      <label>Kategori</label>
      <select id="kategori"></select>
      <label>Keterangan</label>
      <input id="keterangan" placeholder="mis: Pencairan tahap 1 dari kelurahan">
      <label>Jumlah (Rp)</label>
      <input id="jumlah" type="number" min="1" placeholder="0">

      <label>Rincian Item (opsional, untuk transparansi detail)</label>
      <div id="rincianContainer"></div>
      <button type="button" class="add-item-btn" onclick="addRincianRow()">+ Tambah Item Rincian</button>
      <div class="rincian-total" id="rincianTotalDisplay"></div>

      <label>Dicatat oleh</label>
      <input id="dicatatOleh" placeholder="Nama bendahara">
      <button class="primary" id="submitBtn" onclick="submitTransaksi()">Simpan &amp; Publikasikan</button>
    </div>

    <div class="card">
      <h2>Riwayat Transaksi</h2>
      <div id="riwayat" class="hint">Memuat…</div>
    </div>
  </div>
</div>

<script>
const DEFAULT_PIN = "0701";
const KATEGORI_MASUK = ["Bantuan Operasional Kelurahan","Iuran Warga","Donasi","Lainnya"];
const KATEGORI_KELUAR = ["Kebersihan Lingkungan","Keamanan (Ronda)","Kegiatan Sosial","Administrasi","Perbaikan Fasilitas","Lainnya"];
let jenisAktif = "masuk";
let currentData = { saldoAwal: 0, transaksi: [] };
let currentSha = null;
let rincianItems = [];
let rincianCounter = 0;

function addRincianRow(){
  rincianCounter++;
  rincianItems.push({ id: rincianCounter, nama: "", qty: 1, satuan: "buah", harga: 0 });
  renderRincian();
}

function removeRincianRow(id){
  rincianItems = rincianItems.filter(r => r.id !== id);
  renderRincian();
}

function updateRincianField(id, field, value){
  const item = rincianItems.find(r => r.id === id);
  if(item) item[field] = value;
  renderRincian(true);
}

function renderRincian(skipFocusReset){
  const container = document.getElementById("rincianContainer");
  container.innerHTML = rincianItems.map(r => `
    <div class="rincian-row">
      <input class="r-nama" placeholder="Nama barang/jasa" value="${r.nama.replace(/"/g,'&quot;')}" onchange="updateRincianField(${r.id},'nama',this.value)">
      <input class="r-qty" type="number" min="0" placeholder="Qty" value="${r.qty}" onchange="updateRincianField(${r.id},'qty',this.value)">
      <input class="r-satuan" placeholder="Satuan" value="${r.satuan.replace(/"/g,'&quot;')}" onchange="updateRincianField(${r.id},'satuan',this.value)">
      <input class="r-harga" type="number" min="0" placeholder="Harga satuan" value="${r.harga}" onchange="updateRincianField(${r.id},'harga',this.value)">
      <button type="button" class="r-remove" onclick="removeRincianRow(${r.id})">&times;</button>
    </div>
  `).join("");
  const total = rincianItems.reduce((s,r)=> s + (Number(r.qty)||0) * (Number(r.harga)||0), 0);
  const totalEl = document.getElementById("rincianTotalDisplay");
  if(rincianItems.length > 0){
    totalEl.innerHTML = `Total rincian: <strong>Rp ${total.toLocaleString("id-ID")}</strong> &nbsp;
      <button type="button" onclick="document.getElementById('jumlah').value=${total}" style="font-size:12px;padding:4px 8px;border-radius:4px;border:1px solid var(--accent);background:transparent;color:var(--accent);cursor:pointer;">Isi ke Jumlah</button>`;
  } else {
    totalEl.innerHTML = "";
  }
}

document.getElementById("tanggal").value = new Date().toISOString().slice(0,10);

function checkPin(){
  const val = document.getElementById("pin").value;
  if(val === DEFAULT_PIN){
    document.getElementById("loginCard").style.display = "none";
    document.getElementById("app").style.display = "block";
    loadSettings();
    populateKategori();
    fetchCurrentData();
  } else {
    document.getElementById("loginMsg").innerHTML = '<div class="msg error">PIN salah.</div>';
  }
}

function populateKategori(){
  const sel = document.getElementById("kategori");
  const list = jenisAktif === "masuk" ? KATEGORI_MASUK : KATEGORI_KELUAR;
  sel.innerHTML = list.map(k=>`<option value="${k}">${k}</option>`).join("");
}

function setJenis(j){
  jenisAktif = j;
  document.getElementById("btnMasuk").classList.toggle("active", j==="masuk");
  document.getElementById("btnKeluar").classList.toggle("active", j==="keluar");
  populateKategori();
}

function saveSettings(){
  const owner = document.getElementById("ghOwner").value.trim();
  const repo = document.getElementById("ghRepo").value.trim();
  const token = document.getElementById("ghToken").value.trim();
  if(document.getElementById("rememberToken").checked){
    localStorage.setItem("rt07_gh_owner", owner);
    localStorage.setItem("rt07_gh_repo", repo);
    localStorage.setItem("rt07_gh_token", token);
  } else {
    localStorage.removeItem("rt07_gh_owner");
    localStorage.removeItem("rt07_gh_repo");
    localStorage.removeItem("rt07_gh_token");
  }
  fetchCurrentData();
}

function loadSettings(){
  document.getElementById("ghOwner").value = localStorage.getItem("rt07_gh_owner") || "";
  document.getElementById("ghRepo").value = localStorage.getItem("rt07_gh_repo") || "";
  document.getElementById("ghToken").value = localStorage.getItem("rt07_gh_token") || "";
  document.getElementById("rememberToken").checked = !!localStorage.getItem("rt07_gh_token");
}

function ghConfig(){
  return {
    owner: document.getElementById("ghOwner").value.trim(),
    repo: document.getElementById("ghRepo").value.trim(),
    token: document.getElementById("ghToken").value.trim(),
    path: "data.json"
  };
}

function utf8_to_b64(str){ return btoa(unescape(encodeURIComponent(str))); }
function b64_to_utf8(str){ return decodeURIComponent(escape(atob(str))); }

async function fetchCurrentData(){
  const cfg = ghConfig();
  const riwayatEl = document.getElementById("riwayat");
  if(!cfg.owner || !cfg.repo || !cfg.token){
    riwayatEl.textContent = "Isi pengaturan penyimpanan data di atas dulu.";
    return;
  }
  try{
    const res = await fetch(`https://api.github.com/repos/${cfg.owner}/${cfg.repo}/contents/${cfg.path}`, {
      headers: { Authorization: `token ${cfg.token}`, Accept: "application/vnd.github+json" }
    });
    if(!res.ok) throw new Error(`Gagal terhubung (kode ${res.status}). Periksa kembali pengaturan.`);
    const json = await res.json();
    currentSha = json.sha;
    currentData = JSON.parse(b64_to_utf8(json.content.replace(/\n/g,"")));
    document.getElementById("saldoAwalInput").value = currentData.saldoAwal || 0;
    renderRiwayat();
  }catch(e){
    riwayatEl.innerHTML = `<span style="color:var(--danger)">${e.message}</span>`;
  }
}

function renderRiwayat(){
  const list = currentData.transaksi || [];
  const el = document.getElementById("riwayat");
  if(list.length === 0){ el.textContent = "Belum ada transaksi."; return; }
  const sorted = [...list].sort((a,b)=> new Date(b.tanggal)-new Date(a.tanggal)).slice(0,8);
  el.innerHTML = sorted.map(t=>`${t.tanggal} — ${t.jenis==="masuk"?"+":"-"}Rp ${Number(t.jumlah).toLocaleString("id-ID")} (${t.keterangan})`).join("<br>");
}

async function commitToGithub(newData, message){
  const cfg = ghConfig();
  if(!cfg.owner || !cfg.repo || !cfg.token) throw new Error("Lengkapi pengaturan penyimpanan data dulu.");
  const content = utf8_to_b64(JSON.stringify(newData, null, 2));
  const body = { message, content, sha: currentSha };
  const res = await fetch(`https://api.github.com/repos/${cfg.owner}/${cfg.repo}/contents/${cfg.path}`, {
    method: "PUT",
    headers: { Authorization: `token ${cfg.token}`, Accept: "application/vnd.github+json" },
    body: JSON.stringify(body)
  });
  if(!res.ok){
    const err = await res.json().catch(()=>({}));
    throw new Error(err.message || `Gagal commit (status ${res.status})`);
  }
  const json = await res.json();
  currentSha = json.content.sha;
  currentData = newData;
}

async function updateSaldoAwal(){
  try{
    const val = Number(document.getElementById("saldoAwalInput").value) || 0;
    const newData = { ...currentData, saldoAwal: val };
    await commitToGithub(newData, `Update saldo awal ke Rp ${val.toLocaleString("id-ID")}`);
    alert("Saldo awal berhasil diperbarui.");
  }catch(e){
    alert("Gagal: " + e.message);
  }
}

async function submitTransaksi(){
  const msgEl = document.getElementById("formMsg");
  const keterangan = document.getElementById("keterangan").value.trim();
  const jumlah = Number(document.getElementById("jumlah").value);
  if(!keterangan || !jumlah || jumlah <= 0){
    msgEl.innerHTML = '<div class="msg error">Isi keterangan dan jumlah dengan benar.</div>';
    return;
  }
  const btn = document.getElementById("submitBtn");
  btn.disabled = true;
  btn.textContent = "Menyimpan…";
  try{
    const newTx = {
      id: `tx_${Date.now()}`,
      tanggal: document.getElementById("tanggal").value,
      jenis: jenisAktif,
      kategori: document.getElementById("kategori").value,
      keterangan,
      jumlah,
      dicatatOleh: document.getElementById("dicatatOleh").value.trim() || "Bendahara",
      createdAt: Date.now(),
      rincian: rincianItems
        .filter(r => r.nama.trim() !== "")
        .map(r => ({ nama: r.nama.trim(), qty: Number(r.qty)||0, satuan: r.satuan.trim(), harga: Number(r.harga)||0 }))
    };
    const newData = { ...currentData, transaksi: [...(currentData.transaksi||[]), newTx] };
    await commitToGithub(newData, `Catat transaksi: ${keterangan}`);
    msgEl.innerHTML = '<div class="msg success">Tersimpan dan sudah tayang di halaman publik (mungkin perlu 1-2 menit).</div>';
    document.getElementById("keterangan").value = "";
    document.getElementById("jumlah").value = "";
    rincianItems = [];
    renderRincian();
    renderRiwayat();
  }catch(e){
    msgEl.innerHTML = `<div class="msg error">Gagal: ${e.message}</div>`;
  }finally{
    btn.disabled = false;
    btn.textContent = "Simpan & Publikasikan";
  }
}
</script>
</body>
</html>
